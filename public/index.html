<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medi Square Quiz Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .quiz-card { padding: 25px; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #E2E8F0; text-align: left; }
        .quiz-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-color: var(--primary); }
        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">🎓 Medi Square Learning</div>
        <div class="nav-links">
            <button class="btn btn-secondary" onclick="window.location.href='/admin.html'">Admin Login</button>
        </div>
    </nav>
    <div class="container fade-in">
        <div style="text-align: center; margin: 60px 0;">
            <h1 style="font-size: 3rem; color: var(--text-dark); letter-spacing: -1px;">Welcome to <span style="color:var(--primary)">Medi Square</span></h1>
            <p style="font-size: 1.2rem; color: #64748B;">Test your knowledge and track your progress!</p>
        </div>

        <h2 style="margin-top: 40px; border-bottom: 2px solid #E2E8F0; padding-bottom: 15px;">Available Quizzes</h2>
        <div id="quizList" class="quiz-grid">
            <div class="loader"></div>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="regModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
        <div class="card fade-in" style="width:400px; max-width:90%; border-radius:12px;">
            <h3 id="regQuizTitle" style="color:var(--primary)">Start Quiz</h3>
            <p style="margin-bottom: 20px;">Please enter your details to begin. You can only attempt this quiz a limited number of times.</p>
            <form id="regForm">
                <input type="text" id="sName" placeholder="Full Name" required>
                <input type="tel" id="sPhone" placeholder="Phone Number" required>
                <div id="regError" style="color:var(--error); margin-bottom:15px; font-weight:600; font-size:0.9rem;"></div>
                <div class="flex space-between">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('regModal').style.display='none'">Cancel</button>
                    <button type="submit" class="btn">Start Now</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
