<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Medi Square</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%); }
        .login-card { width: 100%; max-width: 380px; padding: 40px 30px; text-align: center; }
        .logo { font-size: 3rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card login-card fade-in">
        <div class="logo">📊</div>
        <h2>Admin Portal</h2>
        <p>Login to manage Medi Square Quizzes</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn" style="width: 100%;">Login</button>
        </form>
        <div id="errorMsg" style="color: var(--error); margin-top: 15px; font-weight: 600; font-size: 0.9rem;"></div>
    </div>
    <script src="/js/login.js"></script>
</body>
</html>
